name: Coupang Item Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: |
          pip install playwright pandas
          playwright install chromium

      - name: 스크레이퍼 실행
        run: python scraper.py

      - name: 결과 저장 및 업데이트
        run: |
          git config --global user.name "Scraper-Bot"
          git config --global user.email "bot@github.com"
          # 파일이 있을 때만 업데이트 시도
          if [ -f coupang_items.csv ]; then
            git add coupang_items.csv
            git commit -m "Update data $(date)"
            git push
          else
            echo "업데이트할 파일이 없습니다. 수집 실패 가능성 있음."
          fi
