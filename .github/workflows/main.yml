name: Coupang Item Scraper

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: |
          pip install playwright pandas python-stealth
          playwright install chromium

      - name: 스크레이퍼 실행
        run: python scraper.py

      - name: 결과 저장 및 업데이트
        run: |
          git config --global user.name "Scraper-Bot"
          git config --global user.email "bot@github.com"
          git add coupang_items.csv
          git commit -m "Update scraped data $(date)" || echo "No changes to commit"
          git push
